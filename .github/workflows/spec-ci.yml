name: Spec CI

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "profiles/**"
      - "schema/**"
      - "bindings/**"
      - "scripts/**"
      - "rust/policy-meta/**"
      - "SPEC.md"
      - "README.md"
      - ".github/workflows/spec-ci.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "profiles/**"
      - "schema/**"
      - "bindings/**"
      - "scripts/**"
      - "rust/policy-meta/**"
      - "SPEC.md"
      - "README.md"
      - ".github/workflows/spec-ci.yml"
  workflow_dispatch:

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check generated artifacts are in sync
        run: cargo run --locked --bin export-artifacts -- --check
        working-directory: rust/policy-meta

      - name: Install validation tooling
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema==4.25.1 PyYAML==6.0.3

      - name: Validate schemas, profiles, and examples
        run: python scripts/validate_spec.py

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs==1.6.1 mkdocs-material==9.7.3 mike==2.1.3 pymdown-extensions==10.21

      - name: Build docs
        run: mkdocs build --strict

  test-rust-crate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run policy-meta crate tests
        run: cargo test --locked
        working-directory: rust/policy-meta
