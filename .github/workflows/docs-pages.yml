name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "schema/**"
      - "bindings/**"
      - "profiles/**"
      - "guides/**"
      - "rust/policy-meta/**"
      - "SPEC.md"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check generated artifacts are in sync
        run: cargo run --locked --bin export-artifacts -- --check
        working-directory: rust/policy-meta

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs==1.6.1 mkdocs-material==9.7.3 mike==2.1.3 pymdown-extensions==10.21

      - name: Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve docs version from SPEC.md
        id: version
        run: |
          VERSION=$(grep -E '^# Policy Meta Spec v[0-9]+' SPEC.md | head -n1 | sed -E 's/^# Policy Meta Spec (v[0-9]+).*$/\1/')
          if [ -z "$VERSION" ]; then
            VERSION="v1"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs
        run: |
          mike deploy --push --update-aliases "${{ steps.version.outputs.value }}" latest
          mike set-default --push latest

      - name: Export gh-pages content for Pages artifact
        run: |
          git fetch origin gh-pages
          git worktree add _site origin/gh-pages
          rm -rf _site/.git
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
